name: "🐛 Bug Report"
description: Report a bug
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Pre-checks
      options:
        - label: I have searched [existing issues](https://github.com/dataelement/Clawith/issues) and this is not a duplicate.
          required: true

  - type: dropdown
    attributes:
      label: Deployment Method
      options:
        - Docker
        - Source (setup.sh)
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected vs Actual Behavior
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Logs / Screenshots
      description: Optional but very helpful for debugging.
    validations:
      required: false
